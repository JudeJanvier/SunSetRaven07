<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander's Maintenance Dashboard</title>
    <!-- Chart.js Library for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #eef2f6;
            --primary-bg: #ffffff;
            --header-bg: #1f3a5f;
            --text-color: #333;
            --primary-blue: #4a90e2;
            --fmc-green: #28a745;
            --nmc-red: #dc3545;
            --shadow: 0 4px 8px rgba(0, 0, 0, 0.07);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Header */
        header {
            background-color: var(--header-bg);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
        }

        /* Main Dashboard Layout */
        .dashboard-container {
            padding: 2rem;
            display: grid;
            gap: 1.5rem;
        }

        /* Key Metrics Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .metric-card {
            background-color: var(--primary-bg);
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .metric-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }
        
        .metric-card .fmc-rate { color: var(--fmc-green); }
        .metric-card .nmc-total { color: var(--nmc-red); }
        .metric-card .avg-downtime { color: #f39c12; }

        .metric-card .label {
            font-size: 1rem;
            color: #666;
            margin-top: 0.5rem;
        }

        /* Chart Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .chart-card {
            background-color: var(--primary-bg);
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .chart-card h3 {
            margin-top: 0;
            text-align: center;
            font-size: 1.25rem;
        }

        /* Tracker Table */
        .tracker-section {
            background-color: var(--primary-bg);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        .tracker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .tracker-header h2 {
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e6e6e6;
        }

        th {
            background-color: #f5f7fa;
            font-weight: 600;
        }
        
        .status-nmc-tag {
            background-color: var(--nmc-red);
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Button */
        .button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .button:hover { background-color: #3a7ac8; }

        /* Modal */
        .modal {
            display: none; position: fixed; z-index: 1001; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff; margin: 5% auto; padding: 2rem;
            border-radius: 8px; width: 90%; max-width: 600px;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #dee2e6; padding-bottom: 1rem; margin-bottom: 1rem;
        }
        .modal-header h2 { margin: 0; }
        .close-button { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Commander's Maintenance Dashboard</h1>
    </header>

    <main class="dashboard-container">
        <!-- Key Metrics Section -->
        <section class="metrics-grid">
            <div class="metric-card">
                <p id="fmcRate" class="value fmc-rate">0%</p>
                <p class="label">FMC Rate</p>
            </div>
            <div class="metric-card">
                <p id="nmcTotal" class="value nmc-total">0</p>
                <p class="label">Total NMC Vehicles</p>
            </div>
            <div class="metric-card">
                <p id="avgDowntime" class="value avg-downtime">0</p>
                <p class="label">Avg. Downtime (Days)</p>
            </div>
        </section>

        <!-- Charts Section -->
        <section class="charts-grid">
            <div class="chart-card">
                <h3>Vehicle Readiness</h3>
                <canvas id="readinessChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>NMC Vehicle Downtime (Days)</h3>
                <canvas id="downtimeChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Parts Status</h3>
                <canvas id="partsChart"></canvas>
            </div>
        </section>

        <!-- Live Tracker Section -->
        <section class="tracker-section">
            <div class="tracker-header">
                <h2>Live Bay & Personnel Tracker</h2>
                <button class="button" id="addAssignmentBtn">Add New Assignment</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Bay</th>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>MOS</th>
                        <th>Platoon</th>
                        <th>Vehicle</th>
                        <th>Problem</th>
                        <th>Downtime (Days)</th>
                    </tr>
                </thead>
                <tbody id="trackerTableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal for adding assignments -->
    <div id="assignmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Assignment</h2>
                <span class="close-button">&times;</span>
            </div>
            <form id="assignmentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Rank</label>
                        <input type="text" id="rank" required>
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>MOS</label>
                        <input type="text" id="mos" placeholder="e.g., 91B" required>
                    </div>
                    <div class="form-group">
                        <label>Platoon</label>
                        <input type="text" id="platoon" required>
                    </div>
                    <div class="form-group">
                        <label>Bay</label>
                        <input type="text" id="bay" placeholder="e.g., Bay 1" required>
                    </div>
                     <div class="form-group">
                        <label>Vehicle ID</label>
                        <input type="text" id="vehicle" placeholder="e.g., USA-12345" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Problem / Fault</label>
                    <textarea id="problem" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Date Vehicle Went Down</label>
                    <input type="date" id="dateDown" required>
                </div>
                <button type="submit" class="button">Save Assignment</button>
            </form>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // --- SAMPLE DATA ---
        // In a real application, this data would come from a database.
        let partsData = [
            { status: 'On Order', count: 12 },
            { status: 'Shipped', count: 5 },
            { status: 'In Shop', count: 8 },
        ];

        let assignments = JSON.parse(localStorage.getItem('assignments')) || [
            { id: 1, rank: 'SGT', name: 'Miller', mos: '91B', platoon: 'Alpha', bay: 'Bay 1', vehicle: 'USA-88124', problem: 'Transmission Fault', dateDown: '2026-03-01' },
            { id: 2, rank: 'SPC', name: 'Davis', mos: '91B', platoon: 'Alpha', bay: 'Bay 2', vehicle: 'USA-75391', problem: 'Engine Overheating', dateDown: '2026-03-10' },
            { id: 3, rank: 'SGT', name: 'Rodriguez', mos: '91E', platoon: 'Bravo', bay: 'Bay 3', vehicle: 'USA-62547', problem: 'Cracked Axle Mount', dateDown: '2026-02-25' },
            { id: 4, rank: 'PFC', name: 'Wilson', mos: '91B', platoon: 'Charlie', bay: 'Bay 4', vehicle: 'USA-91108', problem: 'Hydraulic Leak', dateDown: '2026-03-12' },
        ];
        
        const TOTAL_VEHICLES = 25; // Total number of vehicles in the company

        // --- DOM Elements ---
        const fmcRateEl = document.getElementById('fmcRate');
        const nmcTotalEl = document.getElementById('nmcTotal');
        const avgDowntimeEl = document.getElementById('avgDowntime');
        const trackerTableBody = document.getElementById('trackerTableBody');
        const modal = document.getElementById('assignmentModal');
        const addAssignmentBtn = document.getElementById('addAssignmentBtn');
        const closeModalBtn = document.querySelector('.close-button');
        const assignmentForm = document.getElementById('assignmentForm');

        // --- Chart Instances ---
        let readinessChart, downtimeChart, partsChart;

        // --- Functions ---
        const saveAssignments = () => {
            localStorage.setItem('assignments', JSON.stringify(assignments));
        };

        const calculateDowntime = (dateDown) => {
            const downDate = new Date(dateDown);
            const today = new Date();
            const diffTime = Math.abs(today - downDate);
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const updateAll = () => {
            updateMetrics();
            populateTable();
            renderCharts();
        };

        const updateMetrics = () => {
            const nmcCount = assignments.length;
            const fmcCount = TOTAL_VEHICLES - nmcCount;
            const fmcRate = (fmcCount / TOTAL_VEHICLES) * 100;

            fmcRateEl.textContent = `${fmcRate.toFixed(0)}%`;
            nmcTotalEl.textContent = nmcCount;

            if (nmcCount > 0) {
                const totalDowntime = assignments.reduce((sum, a) => sum + calculateDowntime(a.dateDown), 0);
                avgDowntimeEl.textContent = (totalDowntime / nmcCount).toFixed(1);
            } else {
                avgDowntimeEl.textContent = '0';
            }
        };

        const populateTable = () => {
            trackerTableBody.innerHTML = '';
            assignments.forEach(a => {
                const downtime = calculateDowntime(a.dateDown);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${a.bay}</td>
                    <td>${a.rank}</td>
                    <td>${a.name}</td>
                    <td>${a.mos}</td>
                    <td>${a.platoon}</td>
                    <td><span class="status-nmc-tag">${a.vehicle}</span></td>
                    <td>${a.problem}</td>
                    <td>${downtime}</td>
                `;
                trackerTableBody.appendChild(row);
            });
        };

        const renderCharts = () => {
            // Destroy existing charts to prevent duplicates
            if (readinessChart) readinessChart.destroy();
            if (downtimeChart) downtimeChart.destroy();
            if (partsChart) partsChart.destroy();

            // 1. Vehicle Readiness Chart (Pie)
            const nmcCount = assignments.length;
            const readinessCtx = document.getElementById('readinessChart').getContext('2d');
            readinessChart = new Chart(readinessCtx, {
                type: 'pie',
                data: {
                    labels: ['FMC', 'NMC'],
                    datasets: [{
                        data: [TOTAL_VEHICLES - nmcCount, nmcCount],
                        backgroundColor: ['#28a745', '#dc3545'],
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });

            // 2. Downtime Chart (Bar)
            const downtimeData = assignments.map(a => ({ vehicle: a.vehicle, days: calculateDowntime(a.dateDown) })).sort((a, b) => b.days - a.days);
            const downtimeCtx = document.getElementById('downtimeChart').getContext('2d');
            downtimeChart = new Chart(downtimeCtx, {
                type: 'bar',
                data: {
                    labels: downtimeData.map(d => d.vehicle),
                    datasets: [{
                        label: 'Days Down',
                        data: downtimeData.map(d => d.days),
                        backgroundColor: '#dc3545',
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });

            // 3. Parts Status Chart (Doughnut)
            const partsCtx = document.getElementById('partsChart').getContext('2d');
            partsChart = new Chart(partsCtx, {
                type: 'doughnut',
                data: {
                    labels: partsData.map(p => p.status),
                    datasets: [{
                        data: partsData.map(p => p.count),
                        backgroundColor: ['#f39c12', '#4a90e2', '#3498db'],
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        };

        const handleFormSubmit = (e) => {
            e.preventDefault();
            const newAssignment = {
                id: Date.now(),
                rank: document.getElementById('rank').value,
                name: document.getElementById('name').value,
                mos: document.getElementById('mos').value,
                platoon: document.getElementById('platoon').value,
                bay: document.getElementById('bay').value,
                vehicle: document.getElementById('vehicle').value,
                problem: document.getElementById('problem').value,
                dateDown: document.getElementById('dateDown').value,
            };
            assignments.push(newAssignment);
            saveAssignments();
            updateAll();
            closeModal();
        };

        const openModal = () => {
            assignmentForm.reset();
            modal.style.display = 'block';
        };
        const closeModal = () => { modal.style.display = 'none'; };

        // --- Event Listeners ---
        addAssignmentBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target == modal) closeModal();
        });
        assignmentForm.addEventListener('submit', handleFormSubmit);

        // --- Initial Load ---
        updateAll();
    });
    </script>
</body>
</html>
